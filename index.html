<style>
  :root{--bg:#0b0e1a;--panel:#181e3a;--line:#2b3560;--text:#eef1ff;--dim:#8b93b8;--gold:#f5c542;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic",system-ui,sans-serif;
    background:radial-gradient(900px 500px at 50% -10%, #1a2350 0%, var(--bg) 60%);
    color:var(--text);min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .card{max-width:560px;text-align:center;}
  .emoji{font-size:56px;margin-bottom:16px;}
  h1{font-size:30px;font-weight:800;margin-bottom:10px;letter-spacing:-0.5px;}
  h1 span{color:var(--gold);}
  p{color:var(--dim);line-height:1.8;font-size:15px;margin-bottom:26px;}
  .btn{
    display:inline-block;padding:15px 40px;border-radius:999px;
    background:linear-gradient(180deg,#f5c542,#c99a1e);color:#1a1200;
    font-weight:800;font-size:16px;text-decoration:none;letter-spacing:1px;
    box-shadow:0 6px 22px rgba(245,197,66,.35);transition:transform .12s;
  }
  .btn:hover{transform:translateY(-2px);}
  .links{margin-top:30px;font-size:13px;}
  .links a{color:var(--dim);text-decoration:none;margin:0 10px;}
  .links a:hover{color:var(--text);}
  footer{margin-top:36px;font-size:12px;color:var(--dim);}
</style>

<body>
  <main class="card">
    <div class="emoji">🎮</div>
    <h1><span>Jutopia</span> Games</h1>
    <p>

      스마트폰과 PC 어디서든 플레이하세요.
    </p>
    <a class="btn" href="https://mindweaver74.github.io/Jutopia/">게임 하러 가기 →</a>

    </div>
    <footer>© 2026 Jutopia · made by mindweaver74</footer>
